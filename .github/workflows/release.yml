name: Manual Auto Tag & Release

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate tag name
        id: tag
        run: |
          DATE=$(date +'%Y.%m.%d')
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${DATE}-${SHORT_SHA}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Generate changelog
        id: changelog
        run: |
          if [ -z "${{ steps.prev_tag.outputs.PREV_TAG }}" ]; then
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "🎉 Initial release" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "**All commits:**" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "**Changes since ${{ steps.prev_tag.outputs.PREV_TAG }}:**" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log ${{ steps.prev_tag.outputs.PREV_TAG }}..HEAD --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Build binaries
        run: |
          mkdir -p dist
          echo "🔨 Building for Linux amd64 (static)..."
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            CC="zig cc -target x86_64-linux-gnu" \
            CXX="zig c++ -target x86_64-linux-gnu" \
            go build -ldflags="-s -w -extldflags=-static" -o dist/fake-modbus-server-linux-amd64 ./main.go
          echo "🔨 Building for Windows amd64 (static)..."
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            CC="zig cc -target x86_64-windows-gnu" \
            CXX="zig c++ -target x86_64-windows-gnu" \
            go build -ldflags="-s -w -extldflags=-static" -o dist/fake-modbus-server-windows-amd64.exe ./main.go
          echo "🔨 Building for Linux arm64 (static)..."
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            CC="zig cc -target aarch64-linux-gnu" \
            CXX="zig c++ -target aarch64-linux-gnu" \
            go build -ldflags="-s -w -extldflags=-static" -o dist/fake-modbus-server-linux-arm64 ./main.go

      - name: Create Git tag and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.tag.outputs.TAG }}
          git push origin ${{ steps.tag.outputs.TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Release ${{ steps.tag.outputs.TAG }}
          body: |
            🚀 Auto-generated release **${{ steps.tag.outputs.TAG }}**

            Includes binaries for:
            - Linux amd64
            - Windows amd64
            - Linux arm64 (static)

            ---

            ${{ steps.changelog.outputs.CHANGELOG }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
